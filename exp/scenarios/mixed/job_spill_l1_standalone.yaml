system: pg-like
dataset: job
snapshot: job-first-imdb-v0
budget_tier: moderate
tp:
  profile: generated
  concurrency: 4
  terminals: 4
  rate_cap: 0
  intensity:
    batch_size: 128
  skew:
    mode: hotspot
    hot_modulus: 64
    hot_remainder: 1
  burst:
    mode: steady
ap:
  class: sort-heavy
  arrival: repeated-burst
  terminals: 1
  parallelism: 0
  burst_interval_seconds: 4
thermal:
  enabled: true
  profile: steady-to-burst
  model: table-temperature
  primary_state_table: movie_freshness
  ambient:
    baseline: 0.2
    cooling_rate: 0.1
    observation_step_seconds: 5
    horizon_seconds: 60
  intent:
    steady_state: warm
    transient_state: heating
    target_temperature: 0.8
    drift_rate: 0.15
    heat_budget: 1.3
  tables:
    - name: movie_freshness
      role: hotspot-anchor
      initial_temperature: 0.3
      target_temperature: 0.9
      heat_capacity: 1.0
      access_weight: 1.0
      io_weight: 0.4
      coupling: 0.2
htap_check:
  enabled: true
  type: query-oriented
chaos:
  mode: single-fault
  stage: mixed-steady-state
  start_after_seconds: 30
  duration_seconds: 40
  seed: 1
  injections:
    - id: spill_sort_l1
      family: memory-path
      primitive: spill_pressure
      env_index: 1
      env_workers: 1
      env_session_memory: 64kB
      env_rate: 1.0
      env_spill_query_class: sort-heavy
      target_selector: ap_query_class:sort-heavy
      intensity: L1
      params:
        workers: 1
        session_memory: 64kB
        rate: 1.0
drift:
  data_factor: 0.0
  workload_factor: 0.0
observe:
  export_pg_stats: true
validate:
  consistency: true
  recovery: true
seed: 1
