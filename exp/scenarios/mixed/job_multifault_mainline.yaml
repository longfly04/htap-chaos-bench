system: pg-like
dataset: job
snapshot: job-first-imdb-v0
budget_tier: moderate
tp:
  profile: generated
  concurrency: 4
  terminals: 4
  rate_cap: 0
  intensity:
    batch_size: 128
  skew:
    mode: hotspot
    hot_modulus: 64
    hot_remainder: 1
  burst:
    mode: steady
ap:
  class: sort-heavy
  arrival: repeated-burst
  terminals: 1
  parallelism: 0
  burst_interval_seconds: 4
htap_check:
  enabled: true
  type: query-oriented
chaos:
  mode: multi-fault
  stage: mixed-steady-state
  start_after_seconds: 8
  duration_seconds: 24
  seed: 1
  injections:
    - id: waitxact_hotspot_l1
      family: lock-path
      primitive: wait_xact
      env_index: 1
      env_jobs: 1
      env_lock_hold_seconds: 8
      env_fixture: true
      target_selector: tp-hotspot/movie_freshness
      intensity: L1
      params:
        jobs: 1
        lock_hold_seconds: 8
        fixture: true
    - id: spill_sort_l1
      family: memory-path
      primitive: spill_pressure
      env_index: 2
      env_workers: 1
      env_session_memory: 64kB
      env_rate: 1.0
      env_spill_query_class: sort-heavy
      target_selector: ap_query_class:sort-heavy
      intensity: L1
      params:
        workers: 1
        session_memory: 64kB
        rate: 1.0
    - id: cross_update_deadlock
      family: lock-path
      primitive: deadlock_pair
      env_index: 3
      env_jobs: 1
      target_selector: fixture_rows:2
      intensity: L1
      params:
        jobs: 1
drift:
  data_factor: 0.0
  workload_factor: 0.0
observe:
  export_pg_stats: true
validate:
  consistency: true
  recovery: true
seed: 1
