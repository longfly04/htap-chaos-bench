system: pg-like
dataset: job
snapshot: job-first-imdb-v0
budget_tier: moderate
tp:
  profile: generated
  concurrency: 4
  terminals: 4
  rate_cap: 0
  intensity:
    batch_size: 128
  skew:
    mode: hotspot
    hot_modulus: 64
    hot_remainder: 1
  burst:
    mode: steady
ap:
  class: sort-heavy
  arrival: tp-first
  terminals: 1
  burst_interval_seconds: 5
chaos:
  mode: single-fault
  stage: mixed-steady-state
  start_after_seconds: 10
  duration_seconds: 15
  seed: 1
  injections:
    - id: waitxact_hotspot_l1
      family: lock-path
      primitive: wait_xact
      target_selector: tp-hotspot/movie_freshness
      intensity: L1
      params:
        jobs: 1
        lock_hold_seconds: 15
        fixture: true
drift:
  data_factor: 0.0
  workload_factor: 0.0
observe:
  export_pg_stats: true
validate:
  consistency: true
  recovery: true
seed: 1
