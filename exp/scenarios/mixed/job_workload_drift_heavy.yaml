system: pg-like
dataset: job
snapshot: job-first-imdb-v0
budget_tier: moderate
tp:
  profile: generated
  concurrency: 4
  terminals: 4
  rate_cap: 0
  intensity:
    batch_size: 128
  skew:
    mode: hotspot
    hot_modulus: 64
    hot_remainder: 1
  burst:
    mode: steady
ap:
  class: sort-heavy
  arrival: repeated-burst
  terminals: 1
  parallelism: 0
  burst_interval_seconds: 3
htap_check:
  enabled: true
  type: sync-latency
chaos:
  mode: none
  safety_level: mainline
  cleanup_profile: pg-default
drift:
  data_factor: 0.0
  workload_factor: 0.8
  feature_scope:
    - query_class
    - table_count
    - join_count
    - predicate_count
    - tables
    - predicates
observe:
  export_pg_stats: true
validate:
  consistency: true
  recovery: true
seed: 1
